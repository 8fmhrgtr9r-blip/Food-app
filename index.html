<!DOCTYPE html>
<html>
<link rel="stylesheet" href="style.css">
        <title>Kerala Food App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Kerala Food App 🍛</h1>
</header>

<div class="container">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Puttu_Kadala.jpg">
        <h3>Puttu</h3>
        <p>₹50</p>
        <button onclick="addToCart(50)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Appam_with_stew.jpg">
        <h3>Appam</h3>
        <p>₹60</p>
        <button onclick="addToCart(60)">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Kerala_Parotta.jpg">
        <h3>Kerala Parotta</h3>
        <p>₹70</p>
        <button onclick="addToCart(70)">Add to Cart</button>
    </div>

</div>

<div class="cart">
    <h2>Total: ₹<span id="total">0</span></h2>
</div>

<script src="script.js"></script>
</body>
</html>
